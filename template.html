<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel of Names — Global AI Community</title>
  <meta name="description" content="A GDPR-friendly, open-source Wheel of Names for community events." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d1a;
      --surface:  #13132b;
      --card:     #1a1a32;
      --border:   rgba(99,102,241,0.25);
      --primary:  #6366f1;
      --violet:   #8b5cf6;
      --pink:     #ec4899;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   14px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(99,102,241,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(139,92,246,0.14) 0%, transparent 60%);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      background: rgba(13,13,26,0.7);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text .top {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .logo-text .bottom {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .header-badge {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(99,102,241,0.15);
      border: 1px solid var(--border);
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.5rem;
      padding: 1.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; padding: 1rem; }
      header { padding: 0.75rem 1rem; }
    }

    /* ── Wheel section ── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .wheel-title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    #wheelWrap {
      width: 100%;
      max-width: 520px;
      position: relative;
    }

    #wheel {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 50%;
    }

    /* ── QR Panel ── */
    .qr-panel {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.25rem;
      width: 100%;
      max-width: 520px;
    }

    #qrCanvas {
      border-radius: 8px;
      flex-shrink: 0;
    }

    .qr-info h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .qr-info p {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .qr-info a {
      color: var(--primary);
      text-decoration: none;
      word-break: break-all;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    /* ── Input ── */
    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    #nameInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #nameInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    #nameInput.shake {
      animation: shake 0.35s ease;
      border-color: var(--pink);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-add {
      padding: 0.6rem 1rem;
      background: var(--primary);
      color: #fff;
    }
    .btn-add:hover:not(:disabled) { opacity: 0.85; }

    .btn-spin {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-spin:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(99,102,241,0.5);
      transform: translateY(-1px);
    }

    .btn-reset {
      width: 100%;
      padding: 0.65rem;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-reset:hover:not(:disabled) { background: rgba(255,255,255,0.09); color: var(--text); }

    /* ── Count + list ── */
    .count-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    #count {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
    }

    #namesList {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .name-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border-radius: 7px;
      padding: 6px 8px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .label {
      flex: 1;
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rm {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .rm:hover { color: var(--pink); background: rgba(236,72,153,0.1); }

    /* ── Winner overlay ── */
    #winnerOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 1rem;
    }

    #winnerOverlay.hidden { display: none; }

    #winnerCard {
      background: var(--card);
      border: 2px solid var(--primary);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .trophy {
      font-size: 4rem;
      display: block;
      margin-bottom: 0.75rem;
      color: var(--primary);
    }

    #winnerCard h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    #winnerName {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      word-break: break-word;
      margin-bottom: 1.5rem;
    }

    #closeWinner {
      padding: 0.65rem 2rem;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.6rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.hidden { display: none; }

    /* ── Confetti overlay ── */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="logo" href="https://globalai.community/" target="_blank" rel="noopener noreferrer">
      <div class="logo-icon">G</div>
      <div class="logo-text">
        <span class="top">Global AI Community</span>
        <span class="bottom">Wheel of Names</span>
      </div>
    </a>
    <span class="header-badge">GDPR Friendly · Open Source</span>
  </header>

  <!-- Main -->
  <main>

    <!-- Left: Wheel -->
    <section class="wheel-section">
      <h1 class="wheel-title">🎡 Spin the Wheel</h1>

      <div id="wheelWrap">
        <canvas id="wheel"></canvas>
      </div>

      <!-- QR Code -->
      <div class="qr-panel">
        <canvas id="qrCanvas" width="80" height="80"></canvas>
        <div class="qr-info">
          <h3>Scan to open the wheel</h3>
          <p>Share with participants:<br />
            <a href="https://shubhamkumar27.github.io/wheel2/" target="_blank" rel="noopener noreferrer">
              shubhamkumar.tech/wheel2
            </a>
          </p>
        </div>
      </div>
    </section>

    <!-- Right: Controls -->
    <aside class="controls">

      <!-- Add participant -->
      <div class="card">
        <h2>Add Participant</h2>
        <div class="input-row">
          <input id="nameInput" type="text" placeholder="Enter a name…" maxlength="60" autocomplete="off" />
          <button id="addBtn" class="btn btn-add">Add</button>
        </div>
      </div>

      <!-- Participants list -->
      <div class="card" style="flex:1">
        <h2>
          <div class="count-row">
            <span>Participants</span>
            <span id="count">0 participants</span>
          </div>
        </h2>
        <div id="namesList"></div>
      </div>

      <!-- Actions -->
      <div class="card">
        <button id="spinBtn" class="btn btn-spin" disabled>🎯 Spin the Wheel!</button>
        <div style="height:0.6rem"></div>
        <button id="resetBtn" class="btn btn-reset">Reset</button>
      </div>

    </aside>
  </main>

  <!-- Winner Overlay -->
  <div id="winnerOverlay" class="hidden">
    <div id="winnerCard">
      <span class="trophy">🏆</span>
      <h2>Winner!</h2>
      <div id="winnerName"></div>
      <button id="closeWinner" class="btn btn-spin">Continue</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <!-- Confetti Canvas -->
  <canvas id="confettiCanvas"></canvas>

  <script>/* __BUNDLE__ */</script>
</body>
</html>
